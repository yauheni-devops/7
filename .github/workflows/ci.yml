name: Python Code Quality and Tests # Название пайплайна

on:
  pull_request:
    branches: [main] # Запускать только при PR в ветку main

jobs:
  test: # Название задачи
    runs-on: ubuntu-latest # Выбираем свежую Ubuntu

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4 # Копируем код репозитория на виртуалку

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Устанавливаем нужную версию Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest flake8 # Устанавливаем инструменты тестирования

      - name: Run Linting (Flake8)
        run: |
          # Проверка стиля кода. Если есть ошибки — пайплайн упадет.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Unit Tests (Pytest)
        run: |
          pytest # Запуск самих тестов